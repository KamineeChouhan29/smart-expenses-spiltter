<div class="min-h-screen flex items-center justify-center px-4 py-12 animate-fade-in">
  <!-- Background glow -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-violet-600/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-violet-600 to-indigo-600 rounded-2xl mb-4 shadow-lg shadow-violet-500/30">
        <span class="text-2xl font-bold text-white">₹</span>
      </div>
      <h1 class="text-3xl font-bold text-white">SplitSmart</h1>
      <p class="text-slate-400 mt-1 text-sm">Split expenses, stress-free</p>
    </div>

    <!-- Card -->
    <div class="glass-card p-8 animate-slide-up">
      <h2 class="text-xl font-semibold text-white mb-6">Welcome back</h2>

      <!-- Error -->
      @if (error()) {
        <div class="bg-rose-500/10 border border-rose-500/30 text-rose-400 text-sm rounded-xl px-4 py-3 mb-5 flex items-center gap-2">
          <span>⚠️</span> {{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="form-label" for="login-email">Email address</label>
          <input id="login-email" type="email" class="form-input" placeholder="you@example.com"
                 [(ngModel)]="email" name="email" autocomplete="email">
        </div>
        <div>
          <label class="form-label" for="login-password">Password</label>
          <input id="login-password" type="password" class="form-input" placeholder="••••••••"
                 [(ngModel)]="password" name="password" autocomplete="current-password">
        </div>

        <button id="login-submit" type="submit" class="btn-primary w-full mt-2 flex items-center justify-center gap-2"
                [disabled]="loading()">
          @if (loading()) {
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Signing in...
          } @else {
            Sign in
          }
        </button>
      </form>

      <p class="text-center text-slate-400 text-sm mt-6">
        Don't have an account?
        <a routerLink="/register" class="text-violet-400 hover:text-violet-300 font-medium ml-1 transition-colors">Create one</a>
      </p>
    </div>
  </div>
</div>
