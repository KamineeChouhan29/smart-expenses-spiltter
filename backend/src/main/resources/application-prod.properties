# Production Configuration (Environment Variables)
server.port=8080

# ── MySQL ───────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://your-render-db-host:3306/your_db_name}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:your_username}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────  
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:your_secure_random_secret_at_least_32_chars}
app.jwt.expiration=86400000

# ── Groq AI ─────────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY:your_groq_api_key_here}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama3-70b-8192

# ── Jackson ─────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
